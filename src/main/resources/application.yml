spring:
  application:
    name: clientefacil

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/clientefacil}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:admin}

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true

  flyway:
    enabled: true

springdoc:
  swagger-ui:
    persist-authorization: true

jwt:
  secret: 12345678901234567890123456789012
  expiration: 86400000

server:
  port: ${SERVER_PORT:8080}